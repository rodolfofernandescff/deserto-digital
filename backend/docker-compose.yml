services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATA_PATH: /app/data/municipios.json
    command: >
      sh -c "pip install -e '.[dev]' --quiet &&
             python -m src.etl.pipeline &&
             uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload"
